name: 🚀 Build, Test & Deploy (SSH)

# Deploy on push to main, or run manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two deploys run at once; cancel superseded runs.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: 🏗️ Build, test & deploy over SSH
    runs-on: ubuntu-latest

    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USERNAME }}
      SSH_PORT: ${{ vars.SSH_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # PHP + Composer  (build the deployable vendor/ in CI)
      # ---------------------------------------------------------------
      - name: 🐘 Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2' # keep in sync with your server's PHP version
          extensions: mbstring, dom, curl, gd, zip, bcmath, intl, pdo, pdo_sqlite, pdo_mysql, fileinfo, exif
          coverage: none
          tools: composer:v2

      - name: 📦 Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: 🎼 Install Composer dependencies (with dev, for tests)
        run: composer install --prefer-dist --no-interaction --no-progress

      # ---------------------------------------------------------------
      # Test gate — don't deploy a broken build
      # ---------------------------------------------------------------
      - name: ⚙️ Prepare test environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: 🧪 Run tests
        run: php artisan test

      # ---------------------------------------------------------------
      # Production dependencies + front-end build (Vite)
      # ---------------------------------------------------------------
      - name: 🎼 Re-install Composer deps for production (no dev)
        run: composer install --prefer-dist --no-interaction --no-progress --no-dev --optimize-autoloader

      - name: 🟢 Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install npm dependencies
        run: npm ci

      - name: 🎨 Build front-end assets
        run: npm run build

      - name: 🧹 Remove local .env before upload
        run: rm -f .env # the server keeps its own .env — never overwrite it

      # ---------------------------------------------------------------
      # SSH setup + safety preflight
      # ---------------------------------------------------------------
      - name: 🔑 Load SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🛡️ Trust the server host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: ✅ Preflight (fail fast if secrets are missing)
        run: |
          test -n "$SSH_HOST" || { echo "::error::SSH_HOST secret is not set"; exit 1; }
          test -n "$SSH_USER" || { echo "::error::SSH_USERNAME secret is not set"; exit 1; }
          test -n "$DEPLOY_PATH" || { echo "::error::DEPLOY_PATH secret is not set"; exit 1; }

      - name: 📁 Ensure remote directory exists
        # rsync can create the final folder but not missing parent dirs, so make the full path first.
        run: ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p \"$DEPLOY_PATH\""

      # ---------------------------------------------------------------
      # Sync files to the server with rsync over SSH.
      # NO global --delete: server-only files (custom .htaccess, uploads, etc.)
      # are never removed. Exclusions come from .deployignore (edit that file to
      # protect more paths). public/build is handled separately below.
      # ---------------------------------------------------------------
      - name: 🚀 Deploy files (rsync)
        run: |
          rsync -rltzv \
            -e "ssh -p $SSH_PORT" \
            --exclude-from='.deployignore' \
            --exclude='/public/build' \
            ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      # Built assets are 100% generated by Vite, so pruning stale hashed files
      # here is always safe. --delete is scoped to public/build ONLY.
      - name: 🎨 Sync built assets (prune old hashed files)
        run: |
          rsync -rltzv --delete \
            -e "ssh -p $SSH_PORT" \
            ./public/build/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/public/build/"

      # ---------------------------------------------------------------
      # Post-deploy: migrations, caches, storage link, queue restart.
      # ---------------------------------------------------------------
      - name: 🔧 Run artisan commands on the server
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" bash -s <<'ENDSSH'
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            # Drop stale compiled caches from previous deploys (regenerated below).
            # Must run BEFORE any artisan call, or a stale package manifest can
            # reference removed providers (e.g. Inertia) and crash bootstrap.
            rm -f bootstrap/cache/*.php
            # Rebuild vendor/ from the (clean) committed composer.lock so packages
            # removed in this release (e.g. inertiajs/inertia-laravel) are gone from
            # the server's installed.json and no longer auto-discovered.
            if command -v composer >/dev/null 2>&1; then
              composer install --no-dev --optimize-autoloader --no-interaction --no-progress
            elif [ -f composer.phar ]; then
              php composer.phar install --no-dev --optimize-autoloader --no-interaction --no-progress
            fi
            # Always bring the app back up, even if a step below fails.
            trap 'php artisan up || true' EXIT
            php artisan down --retry=15 || true
            php artisan migrate --force
            php artisan storage:link || true
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan filament:optimize || true
            php artisan queue:restart || true
          ENDSSH
